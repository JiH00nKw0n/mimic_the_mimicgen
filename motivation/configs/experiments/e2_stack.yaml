# E2 — Threading D2E. num_attempts는 B0의 Wilson-LB 산정 후 확정 (기본 6250);
# distance.primary는 B0 경향 보존 체크 후 확정 (PLAN.md §1.3).
experiment: e2
task: stack
variant: D2E
distance:
  primary: d_pos
pool:
  num_attempts: 6250     # 총합 (pool seed당 3125씩 생성 후 merge_hdf5.py로 병합)
  seeds: [1, 2]
binning:
  k: 5
  fallback_k: 4
certification:
  tv_threshold: 0.02
  min_bin_fraction: 0.9
arms:
  baseline: {size: 500}
  transform_uniform: {size: 500, quota_per_stratum: 100}
  ancestry_balanced: {size: 500, quota_per_stratum: 50}
dataset_seeds: [101, 102, 103]
paths:
  demo_hdf5: experiments/e2/stack_D2E/demo.hdf5
  failed_hdf5: experiments/e2/stack_D2E/demo_failed.hdf5
  records: experiments/e2/stack_D2E/attempts.jsonl
  edges: experiments/e2/stack_D2E/bin_edges.json
  out_dir: experiments/e2/stack_D2E
