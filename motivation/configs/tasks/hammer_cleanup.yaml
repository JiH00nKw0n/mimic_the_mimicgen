# 이 태스크에서 비교 불가 — 위치 축(d_pos/d_raw)만 사용 (bounds.py 주석 참조).
task: hammer_cleanup
objects:
  hammer: {symmetry_order: 1}
  drawer: {symmetry_order: 1}
source_dataset: datasets/source/hammer_cleanup.hdf5
env_interface: MG_HammerCleanup
generation_template: mimicgen/exps/templates/robosuite/hammer_cleanup.json
